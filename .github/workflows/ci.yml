name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run tests
        run: bats test/

      - name: Smoke-test dist artifact
        run: |
          scripts/build-dist.sh dist/curlew
          bash dist/curlew --version
          bash dist/curlew --help >/dev/null
