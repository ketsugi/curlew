name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: go.mod

      - name: Install glow
        run: go install github.com/charmbracelet/glow@latest

      - name: Vet and format check
        run: |
          go vet ./...
          test -z "$(gofmt -l .)"

      - name: Run unit tests with coverage
        run: go test ./internal/... -count=1 -coverprofile=unit.cov

      - name: Run e2e tests with coverage
        run: E2E_COVERAGE_OUT=${{ github.workspace }}/e2e.cov go test ./e2e/ -count=1

      - name: Merge coverage profiles
        run: |
          echo "::group::Coverage file diagnostics"
          echo "unit.cov: $(wc -l < unit.cov) lines"
          echo "e2e.cov: $(wc -l < e2e.cov 2>/dev/null || echo 'MISSING')"
          echo "::endgroup::"
          echo "mode: set" > coverage.txt
          grep -hv "^mode:" unit.cov e2e.cov >> coverage.txt 2>/dev/null || true
          echo "coverage.txt: $(wc -l < coverage.txt) lines"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac  # v5.5.5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Smoke-test dist artifact
        run: |
          scripts/build-dist.sh dist/curlew
          dist/curlew --version
          dist/curlew --help >/dev/null
