name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: go.mod

      - name: Vet and format check
        run: |
          go vet ./...
          test -z "$(gofmt -l .)"

      - name: Run tests with coverage
        run: go test ./... -count=1 -coverprofile=coverage.out -covermode=atomic

      - name: Report coverage
        if: github.event_name == 'pull_request'
        run: |
          total=$(go tool cover -func=coverage.out | grep ^total | awk '{print $3}')
          echo "### Test coverage: ${total}" >> $GITHUB_STEP_SUMMARY
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "**Coverage:** ${total}" \
            --edit-last || \
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "**Coverage:** ${total}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Smoke-test dist artifact
        run: |
          scripts/build-dist.sh dist/curlew
          dist/curlew --version
          dist/curlew --help >/dev/null
