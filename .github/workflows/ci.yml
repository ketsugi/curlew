name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version-file: go.mod

      - name: Vet and format check
        run: |
          go vet ./...
          test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./... -count=1

      - name: Smoke-test dist artifact
        run: |
          scripts/build-dist.sh dist/curlew
          dist/curlew --version
          dist/curlew --help >/dev/null
