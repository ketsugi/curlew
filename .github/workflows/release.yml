name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build single-file artifact
        run: scripts/build-dist.sh dist/curlew

      - name: Generate checksum
        run: shasum -a 256 dist/curlew > dist/curlew.sha256

      - name: Create release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          files: |
            dist/curlew
            dist/curlew.sha256
          generate_release_notes: true

      - name: Bump Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.TAP_DISPATCH_TOKEN }}
        run: |
          gh workflow run bump-formula.yml \
            -f formula=curlew \
            -f version="${GITHUB_REF##*/}" \
            -R ketsugi/homebrew-tap
